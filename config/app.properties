# ============================================================
#  SmartParking — Application Configuration
#  File: config/app.properties
#
#  HOW IT WORKS:
#  The app reads this file at startup via AppConfig.java.
#  Change any value here and restart — no recompilation needed.
#  This is the "separation of config from code" principle.
# ============================================================

# ---- Grid / Parking Lot Layout ----
grid.rows=25
grid.cols=45
grid.cell_size=22

# ---- Parking Lot Simulation ----
# What fraction of spots start as occupied when the app loads (0.0 to 1.0)
# 0.45 = 45% occupied, realistic for a busy lot
parking.initial_occupancy=0.45

# Random seed for occupancy generation (-1 = random every launch)
parking.occupancy_seed=42

# ---- Reservation System ----
# How long a reservation lasts before it auto-expires (in seconds)
reservation.ttl_seconds=300

# ---- Traffic / AI ----
# Starting time-of-day mode
# Options: MORNING_RUSH, MIDDAY, EVENING_RUSH, NIGHT, WEEKEND
traffic.initial_mode=MIDDAY

# How often the traffic heatmap updates (milliseconds)
traffic.update_interval_ms=5000

# How strongly new predictions blend into existing weights (0.0 to 1.0)
# Lower = smoother/slower changes, higher = more reactive
traffic.blend_factor=0.25

# ---- AI Allocator ----
# How many candidate spots to evaluate before picking the best
allocator.top_k=5

# How heavily congestion penalizes a route (higher = more avoidance)
allocator.congestion_penalty_scale=1.5

# ---- Pathfinding ----
# Default algorithm on startup: ASTAR_MANHATTAN, ASTAR_EUCLIDEAN,
#                                ASTAR_CHEBYSHEV, ASTAR_WEIGHTED, DIJKSTRA
pathfinding.default_algorithm=ASTAR_MANHATTAN

# Default animation speed in milliseconds (lower = faster)
pathfinding.default_speed_ms=40

# ---- UI ----
# Whether to show the traffic heatmap by default
ui.show_heatmap=true
